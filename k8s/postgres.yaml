# ============================================
# POSTGRES PERSISTENT VOLUME CLAIM
# Requests 1GB of storage for database data
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce    # only one pod can mount this at a time
  resources:
    requests:
      storage: 1Gi     # request 1 GB of disk space

---
# ============================================
# POSTGRES DEPLOYMENT
# Manages the postgres pod
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1          # run exactly 1 pod
  selector:
    matchLabels:
      app: postgres    # find pods with this label
  template:
    metadata:
      labels:
        app: postgres  # label this pod
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine    # pull from Docker Hub (NOT ECR)
        ports:
        - containerPort: 5432         # postgres listens here
        env:
        - name: POSTGRES_DB
          value: "payments"
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "password123"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data    # where postgres stores data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc    # use the PVC we created above

---
# ============================================
# POSTGRES SERVICE
# Gives postgres a stable network address
# Other pods reach it via: postgres:5432
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres      # route traffic to pods with this label
  ports:
  - port: 5432         # service listens on 5432
    targetPort: 5432   # forwards to pod port 5432
  type: ClusterIP      # internal only (not exposed outside cluster)
