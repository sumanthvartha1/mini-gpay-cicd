apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  imagePullSecrets:
      - name: ecr-secret
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: 922120356958.dkr.ecr.ap-south-2.amazonaws.com/gpay-nginx:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31000      # fixed port instead of random
  type: NodePort         # THIS exposes it to the outside world
