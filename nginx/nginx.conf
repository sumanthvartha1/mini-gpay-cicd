# Nginx configuration — the routing brain
# Every request enters here and nginx decides where to send it

server {
    listen 80;    # listen on port 80 (HTTP)

    # Rule 1: /api/* requests → forward to backend container on port 5000
    location /api/ {
        proxy_pass http://backend:5000;
        # "backend" is the service name from docker-compose.yml
        # Docker DNS resolves it to the backend container's IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rule 2: everything else → forward to frontend container on port 80
    location / {
        proxy_pass http://frontend:80;
        # "frontend" is the service name from docker-compose.yml
    }
}
